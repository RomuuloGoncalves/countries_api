<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countries API</title>
    <link rel="stylesheet" href="./assets/style/style.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>

<body onload="createLayout()">
    <header class="px-5 p-3  shadow mb-5 bg-body-tertiary d-flex justify-content-between align-items-center">
        <h1>Where in the world?</h1>

        <div class="dark__mode">
            <span>Dark Mode</span>
        </div>
    </header>
    <section class="px-5">

        <div class="row mb-5">
            <div class="input-group flex-row justify-content-between align-items-center">
                <div class="col-4 d-flex flex-row justify-content-between align-items-center">
                    <span class="border-0" id="basic-addon1">
                        <img class="border-0" height="25px" src="./assets/img/search-interface-symbol.png" alt="">
                    </span>
                    <input id="input" type="text" class="form-control border-0" placeholder="Search for a countrie">
                </div>

                <div class="col-2">
                    <select id="select" class="form-select" aria-label="Default select example">
                        <option value="0">Filter by region</option>
                        <option value="1">Africa</option>
                        <option value="2">America</option>
                        <option value="3">Asia</option>
                        <option value="4">Europe</option>
                        <option value="5">Oceania</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <div class="text-center">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading countries...</span>
        </div>
    </div>

    <main class="px-5">

        <div class="countries">
            <!-- <div class="row d-flex justify-content-around flex-wrap">
                <div class="card" style="width: 18rem;">
                    <img src="./assets/design/desktop-design-detail-dark.jpg " class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">Brasil</h5>
                    </div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">An item</li>
                        <li class="list-group-item">A second item</li>
                        <li class="list-group-item">A third item</li>
                    </ul>
                </div>
            </div> -->
        </div>
    </main>




    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>

    <script src="./assets/js/script.js"></script>
</body>

</html>
